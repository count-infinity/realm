site_name: REALM Documentation
site_description: Real-time Event-Action Layered MUD framework
site_url: https://realm-mud.github.io/realm/
repo_url: https://github.com/realm-mud/realm
repo_name: realm-mud/realm

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Your First Game: getting-started/first-game.md
  - Guides:
    - World Management: guides/world-management.md
    - Color: guides/color.md
  - Reference:
    - Softcode: reference/softcode.md
  - "Tutorial: The Abandoned Lighthouse":
    - Overview: tutorial/index.md
    - 1. The Island: tutorial/01-the-island.md
    - 2. Keys and Doors: tutorial/02-keys-and-doors.md
    - 3. Living Things: tutorial/03-living-things.md
    - 4. Softcode: tutorial/04-softcode.md
    - 5. The Banshee: tutorial/05-the-banshee.md
  - Architecture:
    - Overview: architecture/overview.md
    - Session Lifecycle: architecture/sessions.md
    - Action Propagation: architecture/events.md
    - Command Dispatch: architecture/commands.md
  - Protocols:
    - Overview: protocols/overview.md
    - Adding a Protocol: protocols/adding-protocol.md
  - Development:
    - Contributing: development/contributing.md
    - Testing: development/testing.md
  - Design:
    - Engine Vision: design/engine_vision.md
    - Adventure Coverage: design/adventure_coverage.md
    - Combat: design/combat.md
    - Simplicity Review: design/simplicity_review.md
  - API Reference:
    - Core Objects: api/objects.md
    - Sessions: api/sessions.md
    - Propagation: api/events.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/realm-mud/realm
